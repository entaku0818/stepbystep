name: Server CI

on:
  push:
    branches:
      - main
    paths:
      - 'server/functions/**'
      - '.github/workflows/server-ci.yml'
  pull_request:
    paths:
      - 'server/functions/**'
      - '.github/workflows/server-ci.yml'

jobs:
  lint-build-test:
    name: Functions Lint, Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: server/functions
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: server/functions/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Build TypeScript
        run: npm run build

      - name: Run tests
        run: npm test
